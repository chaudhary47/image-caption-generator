services:
  # Backend FastAPI Service
  - type: web
    name: image-caption-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootContext: backend
    envVars:
      - key: CORS_ORIGINS
        sync: false # Set this to your frontend URL after deployment
      - key: LOG_LEVEL
        value: INFO

  # Frontend Vite Service
  - type: static
    name: image-caption-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    rootContext: frontend
    envVars:
      - key: VITE_API_BASE
        sync: false # Set this to your backend URL + /api after deployment
